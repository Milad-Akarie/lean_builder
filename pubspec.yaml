name: lean_builder
description: A streamlined Dart build system that applies lean principles to minimize waste and maximize speed. Designed for developers who value efficiency and performance.
version: 0.1.10
repository: https://github.com/Milad-Akarie/lean_builder
platforms:
  macos:
  linux:
  windows:

topics:
  - build
  - build-system
  - dart-build-system
  - code-generation
  - codegen

executables:
  lean_builder:

environment:
  sdk: ^3.12.0

dependencies:
  _fe_analyzer_shared: ">=93.0.0 <99.0.0"
  analyzer: ">=10.0.0 <13.0.0"
  args: ^2.7.0
  xxh3: ^1.2.0
  path: ^1.9.1
  collection: ^1.18.0
  meta: ^1.16.0
  glob: ^2.1.3
  watcher: ^1.2.1
  dart_style: ^3.1.5
  ansicolor: ^2.0.3
  source_span: ^1.10.2
  stack_trace: ^1.12.1
  frontend_server_client: ^4.0.0
  yaml: ^3.1.3
  hotreloader: ^4.3.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.15
  coverage: ^1.15.0
